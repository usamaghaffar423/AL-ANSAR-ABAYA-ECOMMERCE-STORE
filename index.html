<!doctype html>
<html lang="en-PK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#1a3a2a" />

    <!-- ── Primary SEO ─────────────────────────────────────────────────── -->
    <title>Al Ansar Abaya Store | Premium Abayas in Chakdara, KPK Pakistan</title>
    <meta name="description" content="Al Ansar Abaya Store – Premium quality abayas, hijabs, and Islamic wear from Chakdara, KPK. Fast delivery across Pakistan. Trusted by 2000+ customers." />
    <meta name="keywords" content="abaya online pakistan, premium abayas, embroidered abayas, casual abayas, hijabs scarves, niqabs, chakdara abayas, kpk islamic wear" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="Al Ansar Abaya Store" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="canonical" href="https://alansarabayah.com/" />
    <link rel="alternate" hreflang="en-PK" href="https://alansarabayah.com/" />

    <!-- ── Open Graph / Facebook ──────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Al Ansar Abaya Store" />
    <meta property="og:title" content="Al Ansar Abaya Store | Premium Abayas in Chakdara, KPK" />
    <meta property="og:description" content="Premium quality abayas, hijabs, and Islamic wear from Chakdara, KPK. Fast delivery across Pakistan." />
    <meta property="og:url" content="https://alansarabayah.com/" />
    <meta property="og:image" content="https://alansarabayah.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Al Ansar Abaya Store - Premium Abayas" />
    <meta property="og:locale" content="en_PK" />

    <!-- ── Twitter Card ───────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@alansarabaya" />
    <meta name="twitter:title" content="Al Ansar Abaya Store | Premium Abayas Chakdara KPK" />
    <meta name="twitter:description" content="Premium abayas, hijabs, and Islamic wear. Fast delivery across Pakistan." />
    <meta name="twitter:image" content="https://alansarabayah.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Al Ansar Abaya Store Premium Collection" />

    <!-- ── Geo / Regional ─────────────────────────────────────────────── -->
    <meta name="geo.region" content="PK-KP" />
    <meta name="geo.placename" content="Chakdara, Dir Lower, Khyber Pakhtunkhwa, Pakistan" />
    <meta name="language" content="Urdu, English" />

    <!-- ── Favicon / Global Icon ─────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="shortcut icon" href="/icon.svg" />

    <!-- ── Fonts: Optimized Loading ──────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet" /></noscript>

    <!-- ── Performance: Preload & DNS Prefetch ─────────────────────── -->
    <link rel="preload" as="image" href="/logo-abaya.png" fetchpriority="high" />
    <link rel="preload" as="video" href="/videos/background-video.webm" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <!-- ── Performance: Critical Path ───────────────────────────────── -->
    <link rel="prefetch" href="/src/components/Shop.jsx" />
    <link rel="prefetch" href="/src/components/ProductDetail.jsx" />

    <!-- ── JSON-LD: Organization ─────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Al Ansar Abaya Store",
      "alternateName": "Al Ansar Abaya Chakdara",
      "url": "https://alansarabayah.com",
      "logo": "https://alansarabayah.com/logo.png",
      "image": "https://alansarabayah.com/og-image.jpg",
      "description": "Al Ansar Abaya Store – Premium abayas, hijabs, and Islamic wear from Chakdara, KPK. Fast delivery across Pakistan.",
      "areaServed": {
        "@type": "Place",
        "name": "Pakistan"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Chakdara, Dir Lower",
        "addressRegion": "Khyber Pakhtunkhwa",
        "addressCountry": "PK"
      },
      "sameAs": [
        "https://www.facebook.com/alansarabaya",
        "https://www.instagram.com/alansarabaya"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "telephone": "+92-349-9300253",
        "areaServed": "PK",
        "availableLanguage": ["English", "Urdu"]
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "2000"
      }
    }
    </script>

    <!-- ── JSON-LD: WebSite + SearchAction ───────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Al Ansar Abaya Store",
      "url": "https://alansarabayah.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://alansarabayah.com/shop?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── JSON-LD: ItemList – Product Categories ─────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Al Ansar Abaya Store Categories",
      "description": "Premium abaya categories available at Al Ansar Abaya Store",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Premium Abayas",
          "url": "https://alansarabayah.com/shop?category=premium-abayas",
          "description": "High-quality premium abayas in various styles"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Embroidered Abayas",
          "url": "https://alansarabayah.com/shop?category=embroidered-abayas",
          "description": "Beautiful embroidered abayas with intricate designs"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Casual Abayas",
          "url": "https://alansarabayah.com/shop?category=casual-abayas",
          "description": "Comfortable casual abayas for everyday wear"
        },
        {
          "@type": "ListItem",
          "position": 4,
          "name": "Formal Abayas",
          "url": "https://alansarabayah.com/shop?category=formal-abayas",
          "description": "Elegant formal abayas for special occasions"
        },
        {
          "@type": "ListItem",
          "position": 5,
          "name": "Hijabs & Scarves",
          "url": "https://alansarabayah.com/shop?category=hijabs-scarves",
          "description": "Premium hijabs and scarves in various colors"
        }
      ]
    }
    </script>

    <!-- ── JSON-LD: BreadcrumbList (homepage) ────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://alansarabayah.com/"
        }
      ]
    }
    </script>
  </head>
  <body>
    <!-- ── Accessibility: Skip to Main ────────────────────────────────── -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-50 focus:p-2 focus:bg-black focus:text-white">

  </body>
</html>
