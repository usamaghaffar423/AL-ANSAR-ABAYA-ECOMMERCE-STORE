name: Build & Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 82.112.239.120 >> ~/.ssh/known_hosts 2>/dev/null || true

          # Sync built files to production
          echo "📤 Uploading production files..."
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p 65002" \
            --delete-after \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='src' \
            --exclude='migrations' \
            --exclude='test_*.php' \
            --exclude='setup_*.php' \
            --exclude='*.config.js' \
            --exclude='package*.json' \
            --exclude='*.md' \
            --exclude='*.xlsx' \
            --exclude='Untitled*' \
            dist/ api/ assets/ robots.txt .htaccess \
            u463999436@82.112.239.120:/home/u463999436/domains/linen-bee-509910.hostingersite.com/public_html/

          # Create index.html redirect if needed (dist/index.html handles SPA routing)
          ssh -i ~/.ssh/id_ed25519 -p 65002 u463999436@82.112.239.120 << 'DEPLOY'
          cd /home/u463999436/domains/linen-bee-509910.hostingersite.com/public_html

          # Cleanup old development files if they exist
          rm -f test_*.php setup_*.php *.xlsx Untitled* *.config.js LOCAL_SETUP.md TECHNICAL_DOCUMENTATION.md 2>/dev/null || true

          echo "✅ Deployment complete!"
          echo ""
          echo "=== Production files ==="
          ls -la | grep -v '^d' | head -10
          echo ""
          echo "=== API files ==="
          ls -la api/ | head -10
          echo ""
          echo "=== React dist folder ==="
          ls -la dist/ 2>/dev/null | head -8
          DEPLOY

      - name: Deployment Success
        run: |
          echo "✅ SSH Deployment to Hostinger completed!"
          echo "🌐 Live site: https://linen-bee-509910.hostingersite.com"
          echo "📋 Test API: https://linen-bee-509910.hostingersite.com/api/test_products_api.php"
