name: Build & Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 82.112.239.120 >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/id_ed25519 -p 65002 u463999436@82.112.239.120 << 'DEPLOY'
          cd /home/u463999436/domains/linen-bee-509910.hostingersite.com/public_html

          if [ ! -d .git ]; then
            echo "📦 First deployment - cloning repository..."
            cd ..
            rm -rf public_html
            git clone https://github.com/usamaghaffar423/AL-ANSAR-ABAYA-ECOMMERCE-STORE.git public_html
            cd public_html
          else
            echo "🔄 Pulling latest code from GitHub..."
            git pull origin main
          fi

          echo "✅ Deployment complete!"
          echo ""
          echo "=== Deployed files ==="
          ls -la | head -15
          echo ""
          echo "=== Git status ==="
          git log -1 --oneline
          DEPLOY

      - name: Deployment Success
        run: |
          echo "✅ SSH Deployment to Hostinger completed!"
          echo "🌐 Live site: https://linen-bee-509910.hostingersite.com"
          echo "📋 Test API: https://linen-bee-509910.hostingersite.com/api/test_products_api.php"
