name: Build & Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy via SSH
        env:
          SSH_HOST: 82.112.239.120
          SSH_PORT: 65002
          SSH_USER: u463999436
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'EOF'
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "📡 Deploying via SSH..."
          ssh -i ~/.ssh/deploy_key -p $SSH_PORT $SSH_USER@$SSH_HOST "
            cd /home/$SSH_USER/domains/linen-bee-509910.hostingersite.com/public_html &&
            echo '🔄 Pulling latest code from GitHub...' &&
            git pull origin main &&
            echo '✅ Deployment complete!' &&
            pwd &&
            git log -1 --oneline
          "

      - name: Deployment Success
        run: |
          echo "✅ SSH Deployment to Hostinger completed!"
          echo "🌐 Live site: https://linen-bee-509910.hostingersite.com"
          echo "📋 Test API: https://linen-bee-509910.hostingersite.com/api/test_products_api.php"
