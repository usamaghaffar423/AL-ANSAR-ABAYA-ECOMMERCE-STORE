name: Build & Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 82.112.239.120
          port: 65002
          username: u463999436
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/u463999436/domains/linen-bee-509910.hostingersite.com/public_html
            echo "🔄 Pulling latest code from GitHub..."
            git pull origin main
            echo "✅ Deployment complete!"
            pwd
            git log -1 --oneline

      - name: Deployment Success
        run: |
          echo "✅ SSH Deployment to Hostinger completed!"
          echo "🌐 Live site: https://linen-bee-509910.hostingersite.com"
          echo "📋 Test API: https://linen-bee-509910.hostingersite.com/api/test_products_api.php"
