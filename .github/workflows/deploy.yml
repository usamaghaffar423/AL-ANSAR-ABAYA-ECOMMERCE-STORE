name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build React app ─────────────────────────────────────────────
      - name: Build production bundle
        run: npm run build

      # ── 5. Deploy built frontend (dist/) → public_html/ ───────────────
      - name: Deploy frontend to Hostinger via SFTP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "dist/"
          target: "/public_html/"
          rm: false

      # ── 6. Deploy PHP backend (api/) → public_html/api/ ───────────────
      - name: Deploy API to Hostinger via SFTP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "api/"
          target: "/public_html/"
          rm: false

      # ── 7. Deployment success notification ─────────────────────────────
      - name: Deployment success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📱 Frontend: https://alansarabayah.com"
          echo "🔌 API: https://alansarabayah.com/api"
