name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & SSH Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build React app ─────────────────────────────────────────────
      - name: Build production bundle
        run: npm run build

      # ── 4.5. Inject production DB credentials into config.php ─────────
      - name: Inject DB credentials
        run: |
          sed -i "s|getenv('DB_USER') ?: ''|getenv('DB_USER') ?: '${{ secrets.DB_USER }}'|g" api/config.php
          sed -i "s|getenv('DB_PASS') ?: ''|getenv('DB_PASS') ?: '${{ secrets.DB_PASS }}'|g" api/config.php
          sed -i "s|getenv('DB_NAME') ?: ''|getenv('DB_NAME') ?: '${{ secrets.DB_NAME }}'|g" api/config.php

      # ── 5. Deploy to Hostinger via SSH/SFTP ────────────────────────────
      - name: Deploy to Hostinger
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.SSH_TARGET }}
        with:
          source: "dist/,api/"
          target: ${{ secrets.SSH_TARGET }}
          exclude: |
            .git,
            .github,
            node_modules,
            .gitignore,
            .env,
            migrations/
          script_before: |
            mkdir -p ${{ secrets.SSH_TARGET }}/api
          script_after: |
            echo "Deploy completed successfully"
